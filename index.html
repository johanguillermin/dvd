<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma DVDthèque</title>
    <style>
        /* Styles de base et thémisation */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-color: #e50914;
            --modal-overlay: rgba(0, 0, 0, 0.85);
            --input-bg: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        /* --- STYLE DU LOGO STYLE ACTION / PIÈGE DE CRISTAL --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 25px 0;
            background: radial-gradient(circle, #2a1111 0%, #1a1a1a 70%);
            border-bottom: 2px solid #333;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.15);
        }

        .logo-action {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-style: italic;
            margin: 0;
            display: inline-block;
            position: relative;
            
            /* Effet Métallique Chromé / Acier */
            background: linear-gradient(to bottom, #ffffff 0%, #f1f1f1 40%, #7c7c7c 50%, #f5f5f5 55%, #9c9c9c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Ombre portée et lueur rouge d'alerte */
            filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.6)) 
                    drop-shadow(3px 4px 0px #000)
                    drop-shadow(0px 0px 15px rgba(229, 9, 20, 0.6));
        }

        /* Le mot "MA" plus petit au-dessus */
        .logo-action::before {
            content: "MA";
            position: absolute;
            top: -20px;
            left: 2px;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: #e50914;
            -webkit-text-fill-color: #e50914;
            font-style: normal;
            font-weight: 900;
            text-shadow: 0px 0px 8px rgba(229, 9, 20, 0.8), 1px 1px 0px #000;
        }

        /* Barre de recherche et filtres */
        .search-filters-bar {
            max-width: 1400px;
            margin: 0 auto 30px auto;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group input, .filter-group select {
            background-color: var(--input-bg);
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: var(--accent-color);
        }

        .results-count {
            width: 100%;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Grille de la liste des films */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Vignettes de film */
        .movie-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        .poster-wrapper {
            position: relative;
            padding-top: 150%;
            background-color: #333;
        }

        .movie-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-info-summary {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .movie-title {
            margin: 0;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 600;
            line-height: 1.3;
        }

        /* Boutons de contrôle */
        .controls {
            text-align: center;
            margin: 40px 0;
        }

        .btn-more {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-more:hover {
            background-color: #b80710;
        }

        .btn-more:disabled {
            background-color: #555;
            cursor: not-allowed;
            display: none;
        }

        /* Fenêtre modale */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-bg);
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: var(--text-color);
            cursor: pointer;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 600px) {
            .modal-body {
                flex-direction: row;
            }
        }

        .modal-poster {
            width: 100%;
            max-width: 300px;
            object-fit: cover;
            margin: 0 auto;
        }

        .modal-details {
            padding: 30px;
            flex-grow: 1;
        }

        .modal-title {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .metadata {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .metadata strong {
            color: var(--text-color);
        }

        .synopsis {
            line-height: 1.6;
            font-size: 1rem;
            border-top: 1px solid #444;
            padding-top: 15px;
        }

        /* Ajustement responsive du logo pour mobile */
        @media (max-width: 600px) {
            .logo-action {
                font-size: 2.2rem;
            }
            .logo-action::before {
                top: -14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-action">DVDthèque</h1>
    </header>

    <div class="search-filters-bar">
        <div class="filter-group">
            <label for="search-input">Recherche libre</label>
            <input type="text" id="search-input" placeholder="Titre, réalisateur, mots-clés...">
        </div>
        
        <div class="filter-group">
            <label for="genre-filter">Genre</label>
            <select id="genre-filter">
                <option value="">Tous les genres</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="year-filter">Année de sortie</label>
            <select id="year-filter">
                <option value="">Toutes les années</option>
            </select>
        </div>

        <div class="results-count" id="results-count">Chargement des films...</div>
    </div>

    <main class="movies-grid" id="movies-grid"></main>

    <div class="controls">
        <button id="btn-load-more" class="btn-more">Voir plus</button>
    </div>

    <div class="modal" id="movie-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <div class="modal-body">
                <img id="modal-img" class="modal-poster" src="" alt="Affiche du film">
                <div class="modal-details">
                    <h2 id="modal-title" class="modal-title"></h2>
                    <div class="metadata">
                        <div id="modal-original-title"></div>
                        <div><strong>Réalisateur :</strong> <span id="modal-director"></span></div>
                        <div><strong>Année :</strong> <span id="modal-year"></span></div>
                        <div><strong>Durée :</strong> <span id="modal-duration"></span> min</div>
                        <div><strong>Genre(s) :</strong> <span id="modal-genres"></span></div>
                        <div><strong>Format :</strong> <span id="modal-format"></span></div>
                    </div>
                    <p id="modal-synopsis" class="synopsis"></p>
                </div>
            </div>
        </div>
    </div>

        const closeModalBtn = document.getElementById('close-modal');

        // Éléments internes Modale
        const mImg = document.getElementById('modal-img');

        const mOrigTitle = document.getElementById('modal-original-title');
        const mDirector = document.getElementById('modal-director');
        const mYear = document.getElementById('modal-year');
        const mDuration = document.getElementById('modal-duration');
        const mGenres = document.getElementById('modal-genres');
        const mFormat = document.getElementById('modal-format');
        const mSynopsis = document.getElementById('modal-synopsis');
